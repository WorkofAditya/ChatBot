<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    h1 { margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
    label { display: flex; flex-direction: column; font-size: 14px; gap: 6px; }
    input, select, button { padding: 8px; font-size: 14px; }
    .lists-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
    .list-block { display: flex; flex-direction: column; gap: 8px; }
    .list-block h3 { margin: 0; }
    .list-box { min-height: 260px; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .footer { margin-top: 16px; display: flex; gap: 8px; align-items: center; }
    .note { color: #555; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Dispatch</h1>

  <form id="dispatchForm">
    <div class="grid">
      <label>
        Dispatch No*
        <input id="dispatchNo" name="dispatchNo" required />
      </label>
      <label>
        Method*
        <select id="dispatchMethod" name="dispatchMethod" required>
          <option value="">Select method</option>
          <option value="Road">Road</option>
          <option value="Rail">Rail</option>
          <option value="Air">Air</option>
        </select>
      </label>
      <label>
        Branch*
        <input id="branch" name="branch" required />
      </label>
      <label>
        Vehicle No
        <input id="vehicleNo" name="vehicleNo" />
      </label>
      <label>
        Driver Name
        <input id="driverName" name="driverName" />
      </label>
      <label>
        Dispatch Date
        <input type="date" id="dispatchDate" name="dispatchDate" />
      </label>
    </div>

    <div class="lists-wrap">
      <div class="list-block">
        <h3>LR ON GODOWN</h3>
        <select id="lrOnGodown" class="list-box" multiple></select>
      </div>

      <div class="actions">
        <button type="button" id="moveToVehicle" aria-label="Move selected to vehicle">&gt;</button>
        <button type="button" id="moveToGodown" aria-label="Move selected to godown">&lt;</button>
      </div>

      <div class="list-block">
        <h3>LR ON VEHICLE</h3>
        <select id="lrOnVehicle" class="list-box" multiple></select>
      </div>
    </div>

    <div class="footer">
      <button type="submit" id="loadingBtn">Loading</button>
      <span class="note">Dispatch details are saved only for LR numbers in “LR ON VEHICLE”.</span>
    </div>
  </form>

  <script src="Dispatch.js"></script>
</body>
</html>
